name: CI

on:
  push: { branches: [main] }
  pull_request:

jobs:
  ai-service:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: ai-service } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip }
      - run: pip install -r requirements-dev.txt
      - run: ruff check app tests
      - run: pytest -q

  # Active au J2 (semaine 1) apres generation du backend.
  # NB : `mvn` (pas `./mvnw`) car aucun wrapper n'est commite pour l'instant ;
  #      les runners ubuntu-latest fournissent Maven. Bascule vers ./mvnw des que le
  #      wrapper est genere (mvn -N wrapper:wrapper).
  backend:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: backend } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "21", cache: maven }
      - run: mvn -B -ntp verify

