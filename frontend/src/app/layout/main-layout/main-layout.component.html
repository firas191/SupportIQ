<mat-toolbar color="primary" class="topbar">
  <button mat-icon-button (click)="drawer.toggle()" aria-label="Basculer le menu">
    <mat-icon>menu</mat-icon>
  </button>
  <span class="brand">SupportIQ</span>
  <span class="spacer"></span>
  @if (user(); as u) {
    <span class="user">{{ u.email }} · {{ u.role }}</span>
  }
  <button mat-button (click)="logout()">
    <mat-icon>logout</mat-icon>
    Déconnexion
  </button>
</mat-toolbar>

<mat-sidenav-container class="shell">
  <mat-sidenav #drawer mode="side" opened class="sidenav">
    <mat-nav-list>
      <a mat-list-item routerLink="/dashboard" routerLinkActive="active-link">
        <mat-icon matListItemIcon>dashboard</mat-icon>
        <span matListItemTitle>Tableau de bord</span>
      </a>
      @if (role() === 'ADMIN') {
        <a mat-list-item routerLink="/imports" routerLinkActive="active-link">
          <mat-icon matListItemIcon>upload_file</mat-icon>
          <span matListItemTitle>Imports</span>
        </a>
        <a mat-list-item routerLink="/admin/users" routerLinkActive="active-link">
          <mat-icon matListItemIcon>group_add</mat-icon>
          <span matListItemTitle>Utilisateurs</span>
        </a>
      }
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content class="content">
    <router-outlet />
  </mat-sidenav-content>
</mat-sidenav-container>
